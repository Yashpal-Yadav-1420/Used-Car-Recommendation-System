<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS media queries for responsiv websites</title>
    <style>
        body{
            background-color: cadetblue;/*Aap styles change kar sakte hain aapne device ke accourding*/
        }

        @media screen and (orientation: landscape){
            body{
                border:2px solid purple;
            }
        }

        @media only screen and (max-width: 455px){/*jab width 455px se kam ho tab yeh CSS lag jayegi */ 
            body{
                background-color: brown;/*Agar width 455px se kam hai toh background-color brown ho jayega*/
            }
            .boxes{
                flex-direction: column;
            }
        }

        .boxes{
            display: flex;/*flex lagane se sabhi boxes ek horizontallly aa jate hain and screen size ke according arrange ho jate hain */
        }
        .box{
            width:344px;
            height:344px;
            background-color:seagreen ;
            padding:3px ;
            margin: 3px ;
        }
    </style>
</head>
<body>
    <div>
        Hey I ama a red body guy!
    </div>
    <div class="boxes">

        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
     </div>
</body>
</html>
