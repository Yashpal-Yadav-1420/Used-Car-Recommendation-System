<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    let product2 = {
      company : 'Nike',
      price: '₹ 36000',
      model:'red001',
    };
    let product1 = {
      company : 'Nike',
      price: '₹ 36000',
      model:'red001',
      
      isIdenticalProduct : function(product1, product2){
        if(product1 == product2){
          return true;
        }
        if(typeof product1!=='object'|| typeof product2 !=='object'){
          console.warn('Parameter passed was not an object');
          return false;
        }
        if(product1.company === product2.company && product1.price === product2.price && product1.model === product2.model){
          return true;
        }
        else {
          return false;
        }
      }
    };
    console.log(isIdenticalProduct(product1,''))
    console.log(isIdenticalProduct(product1,product1))
    console.log(isIdenticalProduct(product1,product2))
  </script>
</body>
</html>
