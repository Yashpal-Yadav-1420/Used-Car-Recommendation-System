<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main axis and Cross axis</title>
    <style>
        .box{
            display: flex;
            flex-direction: column;
            height: 200px;
            border: 2px solid black;
            justify-content: center;
            align-items: center;
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
            padding: 40px;
            background-color: #f3f4f6;  
        }
        h1{
            margin-bottom: 20px;
        }
        .wrapper{
            display: flex;
            gap: 40px;   
        }
        .demo{
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #ddd;
            width: 45%; 
        }
        .container{
            border: 2px solid #000;
            height: 150px;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            background: #ffffff;
        }
        .containers{
            border: 2px solid #000;
            height: 260px;
            display: flex;
            border-radius: 10px;
            padding: 10px;
            background: #ffffff;
        }
        .items{
            background: #90e0ef;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            font-size: 22px;
            text-align: center;
            width: 60px;
        }
        .items:nth-child(2){
            background: #0a6d7f;
        }
    </style>
</head>
<body>
    <!--<p>Axis concept is based on the flex box how you can </p>
    <p>Axis concept is defined as with the use of flex box how you control the direction of an element <br>
    sapcing, allignment, centric ki batt nahi hogi sirf direction ki baat hogi </p>
    <p>The way you tell items ko kidahr move karna hai yeh do chize control karti hain 1. Main Axis 2. Cross Axis </p>
    <p>Main axis(row) = left to right(default) <br>
       Cross axis(column) = top to bottom</p>
       <p>While working with the first fix the direction then do the allignment </p>
       <p>when writing flexbox code always ask yourse that wether you want your element sideways or top to bottom <br>
          if side ways then row wise ko main axis bana lo and if top to bottom chahiye to column ko main axis bana lo tab aapko pata chal jayega ki kisko justify karna hai and kisko align</p>
          main axis matlab items us axis me move karenge-->
       <!--<div class="box">
        <div class="class">A</div>
        <div class="class">B</div>
        <div class="class">C</div>
       </div>-->
       <h1>Flexbox: Main axis vs Cross axis</h1>

       <div class="wrapper">
        <div class="demo">
            <div class="label">Main axis = Row(Default)</div>
            <div class="arrow">Main axis direction - left to right</div>
            <div class="arrow">Cross axis direction - top to bottom</div>
            <div class="container" style="justify-content: center; align-items: center;">
                <div class="items">A</div>
                <div class="items">B</div>
                <div class="items">C</div>
            </div>
        </div>
       </div>

       <div class="demo">
            <div class="label">Main axis = Column(flex-direction:column;)</div>
            <div class="arrow">Main axis direction - top to bottom</div>
            <div class="arrow">Cross axis direction - left to right</div>

            <div class="containers" style="flex-direction:column; justify-content: center; align-items: center;">
                <div class="items">A</div>
                <div class="items">B</div>
                <div class="items">C</div>
            </div>
       </div>            
</body>
</html>
