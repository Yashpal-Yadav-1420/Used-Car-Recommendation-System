<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
          .box1{  background-color: springgreen;/*position: relative;top: 25px;left: 52px;
            z-index: 1;*/
            position: absolute;/*absolutre property dene se aisa hota lagata hai k ye elament hai hi nahi document mai*/
            top: 0px;

         }
         .box2{background-color: aqua;position: inherit ;}/*inherit use karne ke bad hum isse hum aapne hisab se kahi bhi move kar sakte hain*/
         .box3{background-color: deeppink;}
         .box4{background-color: teal;}
         /*1) by default charo boxes ki position static hoti hai 
         2) Position ek property hoti hai CSS me by default sattic hoti hai 
         static ka matlab hota hai ki ispe top, bottom, left, right, z-index nahi lag sakte  */
        .box{
            height: 133px;
            width: 83vw;
            padding:3px;
            margin:3px;
            border:2px solid black;
        }
        .parent{
            padding: 43px;
            margin: 34px;
            border: 3px solid purple;
        }

    </style>
</head>
<body>
    <div class="parent">
        
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>
</html>
