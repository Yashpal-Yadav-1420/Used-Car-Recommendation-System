<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Mini Project</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <header class="sticky-header">
        <h1>My Profile</h1>
    </header>
    <section class="Profile-card">
        <div class="badge">🎈</div>
        <img src="html.jpg" alt="Book" class="profile-image">
        <h2 class="name">Codex Giga</h2>
        <p class="bio">
            Front-end Developer with 5+ years of experience in building user interface <br>
            and friendly tools. Also experience in backend and AI engineering.
        </p>
        <div class="stats">
            <div class="stat"><h3>130</h3></div>
            <p>Projects</p>
            <div class="stat"><h3>80</h3></div>
            <p>Clients</p>
            <div class="stat"><h3>10+</h3></div>
            <p>Awards</p>
        </div>
    </section>
    <button class="contact-btn">📩 Contact me</button>
    <br>
    <br><br><br>
    <p>They have taen default spacing in css</p>
</body>
</html>
