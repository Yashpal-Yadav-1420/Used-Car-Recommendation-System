<!DOCTYPE html>

<body>
  <script>
    let n = prompt("Enter your number: ");
    function odev(n){
      if (n%2===0){
        return `Entered number is an even number`;
      }else{
        return `Entered number is an odd number`;
      }
    }
  alert(odev(n));
  </script>
</body>
