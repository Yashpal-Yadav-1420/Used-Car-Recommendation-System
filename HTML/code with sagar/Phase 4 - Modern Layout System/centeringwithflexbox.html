<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centering With Flex Box</title>
    <style>
        body{
            background: #e7f0f4;
            font-family: Arial, Helvetica, sans-serif;
            padding: 50px;

        }
        .container{
            width: 400px;
            height: 300px;
            background: white;
            border: 3px solid #ddd;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            background: #00b4d8;
             color: white;
             padding: 20px 40px; 
             font-size: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">I AM CENTERED</div>
    </div>
    <ol>
        <li>Flex centering works when you have fixed-height container</li>
        <li>If container don't have vertical height then you can't so vertical centering</li>
        <li>flex direction - column <br> jc = vertical <br> al = horizontal</li>
        <li>flex box centering jo hoti hain vo responsive hti hain</li>
    </ol>
</body>
</html>
