<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h3 id="grettings"></h3>
  <script>
    function doGretting(name = 'Dear'){
    let d = new Date();
    let hours = d.getHours();
    let heading = document.querySelector('#grettings');
    if (hours>=0 && hours <12){
      heading.innerText = `Good Morning ${name}`;
    }else if(hours>= 12 && hours < 23){
      heading.innerText = `Good Afternoon ${name}`;
    }else{
      heading.innerText = `Good Night ${name}`;
    }
  }
  doGretting('Yashpal Yadav');
  </script>
</body>
</html>
