<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid + FlexBox</title>
    <style>
        body{
            background: #f5f5f7;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding: 40px; 
        }
        .product-grid{
            display: grid;
            /*background-color: aqua;*/
            grid-template-columns: 1fr 1fr 1fr;
            gap: 25 px;

        }
        .card{
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid black;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        card img{
            object-fit: contain;
        }
        .price{
            font-size: 20px;
            font-weight: bold;
        }
        .btn-row{
            display: flex;
            gap: 10px;
        }
        .btn-blue .btn-black{
            padding: 8px 18px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            color: white;
        }
        .btn-blue{
            background: #0071e3;
        }
        .btn-black{background: rgb(62, 53, 53);}
    </style>
</head> 
<body>
    <h1>Product</h1>

    <div class="product-grid">
        <div class="card">
            <img src="pexels-japy-29020349.jpg" alt="iPhone" width="200px">
            <div class="price">$999</div>
            <div class="btn-row">
                <button class="btn-blue">Buy</button>
                <button class="btn-black">Info</button>
            </div>
        </div>
        <div class="card">
            <img src="https://www.mobiledokan.com/media/apple-iphone-17-pro-max-white-official-image.webp" alt="iPhone" width="200px">
            <div class="price">$1999</div>
            <div class="btn-row">
                <button class="btn-blue">Buy</button>
                <button class="btn-black">Info</button>
            </div>
        </div>
        <div class="card">
            <img src="https://hallo.fo/cdn/shop/files/17green_4ba45ac7-cf84-4044-938a-6e9fead03e6d.webp?v=1758368688&width=1445" alt="iPhone" width="200px">
            <div class="price">$1999</div>
            <div class="btn-row">
                <button class="btn-blue">Buy</button>
                <button class="btn-black">Info</button>
            </div>
        </div>
    </div>
</body>
</html>
