      if(gender==='F'&& age>=65){

      }
    }else if(age<=5){
        ticketPrice=0;
    }else if(age>8 && age<65){
      ticketPrice;
    }
    else if(age >=65){
      ticketPrice=500*0.7;
    }
    alert(`Your Ticket Price after Discount is ${ticketPrice}`)
  </script>
