<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Chart - Student Occupations</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <canvas id="radarChart"></canvas>

    <script>
        // Grouped Data - Occupations and Number of Students
        const occupations = [
            "Full-time Student", "Part-time Intern", 
            "Freelance Developer", "Working Professional", 
            "Research Assistant", "Part-time Tutor", 
            "Freelance Data Analyst", "AI Research Intern",
            "Data Science Trainee", "Content Creator",
            "Technical Writer"
        ];

        // Number of students in each occupation
        const studentCounts = [6, 3, 1, 3, 1, 1, 1, 1, 1, 1, 1];

        // Radar Chart Configuration
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: occupations, 
                datasets: [{
                    label: 'Students in Each Occupation',
                    data: studentCounts,
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 2,
                    pointBackgroundColor: 'rgba(54, 162, 235, 1)',
                    pointRadius: 5
                }]
            },
            options: {
                responsive: true,
                scales: {
                    r: {
                        suggestedMin: 0,
                        suggestedMax: 8,
                        angleLines: { color: "rgba(200, 200, 200, 0.5)" },
                        grid: { color: "rgba(200, 200, 200, 0.2)" },
                        pointLabels: { font: { size: 14 } }
                    }
                },
                plugins: {
                    legend: { display: true, position: 'top' }
                }
            }
        });
    </script>

</body>
</html>
