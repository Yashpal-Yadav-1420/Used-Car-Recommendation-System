<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    #my-button{
      height: 50px;
      width: 50px;
      font-size: 15px;
      border-radius: 10px;
      border: none;
    }
    .odd{
      background-color: chocolate;
    }
    .even{
      background-color: lawngreen;
    }
  </style>
</head>
<body>
  <button id="my-button" onclick="buttonPressed()"></button>
  <!--onclick me hum direct function bhi call kar sakte hain-->
  <script>
    let noOfTimesClicked = localStorage.getItem('noOfTimesClicked') || 0;
    function buttonPressed(){
      noOfTimesClicked++;
      localStorage.setItem('noOfTimesClicked',noOfTimesClicked);
      updateButton();

    }
    function updateButton(){
      let button = document.querySelector('#my-button');
      if(noOfTimesClicked%2===0){
        button.classList.remove('odd');
        button.classList.add('even');
      }else{
        button.classList.remove('even');
        button.classList.add('odd');
      }
      button.innerText = noOfTimesClicked;
    }
    updateButton();
    // based on this value of 0 yeh ek class assign karega and usko text assign kardega to mujhe yaha default text bhi assign karne ki zarurat nahi hain
  </script>
  <!--jo class app specifically javascript ke liye use karte hain usko genrally aap (eg. js-odd) aise define kare usse logo ko pata lag jaye ki aap yeh js me hi use karne wale hain -->
</body>
</html>
