<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation bar</title>
    <style>
    body{
        margin: 0px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        background: pink;  
    }
    nav{
        background: white;
        border-bottom: 5px solid black;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 14px 0;
    }
    .nav-content{
        width: 90%;
        max-width: 110px;
        display: flex;
        justify-content:space-between;
        align-items: center;
    }
    .logo{
        font-size: 22px;
        font-weight: bold;
    }
    .menu{
        display: flex;
        gap: 20px;
    }
    .menu a{
        text-decoration: none;
        color: #333;
        font-size: 15px;
        letter-spacing: -0.4px;
        padding: 16px 0;

    }
    .menu a:hover{
        color: #0071e3;
    }
    .btn-blue{
        background: #0071e3;
        color: white;
        padding: 8px 20px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
    }
    .btn-black{
        background:#1d1d1f;
        color: white;
        padding: 8px 20px;
        font-size: 14px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
    }
    </style>
</head>
<body>
    <nav>
 <!--<a href="/html/">HTML</a> |
 <a href="/css/">CSS</a> |
 <a href="/js/">JavaScript</a> |
 <a href="/python/">Python</a>-->
 <div class="nav-content">
    <div class="logo">*</div>
    <div class="menu">
        <a href="http://" target="_blank" rel="noopener noreferrer">Store</a>
        <a href="http://" target="_blank" rel="noopener noreferrer">Mac</a>
        <a href="http://" target="_blank" rel="noopener noreferrer">iPad</a>
        <a href="http://" target="_blank" rel="noopener noreferrer">iphone</a>
        <a href="http://" target="_blank" rel="noopener noreferrer">Macbook</a>
        <a href="http://" target="_blank" rel="noopener noreferrer">Support</a>
    </div>
    <div class="button">
        <button class="btn-blue">Buy</button>
        <button class="btn-black">Log-in</button>
    </div>
 </div>
</nav>
</body>
</html>
