<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <button id="mybutton">Click me</button>
  <script>
    let l = document.querySelector('#mybutton');
    let behavoiur = event => {console.log('I am clicked')};
    l.addEventListener('click',behavoiur);
    let printDate = event => {console.log(new Date())};
    l.addEventListener('click',printDate);
  </script>
</body>
</html>
