<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .btn{
      height: 20px;
      width: 80px;
      background-color: red;
      color: white;

    }
    .js-size-double{
      font-size: 30px;
      height: 40px;
      width: 160px;
    }
  </style>
</head>
<body>
  <button class="btn" onclick="setTimeout(doublethesize,2000)">CLick me</button>
  <script>
  function doublethesize(){
    let btnE = document.querySelector('.btn');
    btnE.classList.add('.js-size-double')
  }
  </script>
</body>
</html>
